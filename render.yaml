services:
  # ===========================================
  # API GATEWAY UNIFICATO - Unico webservice
  # Serve frontend React e monta tutti i microservizi
  # ===========================================
  - type: web
    name: api-gateway
    runtime: python
    pythonVersion: 3.12.7
    rootDirectory: backend/api-gateway
    buildCommand: pip install -r requirements.txt && cd ../../frontend-react && npm install && npm run build
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: evoluzione-imprese-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BASE_URL
        sync: false
      - key: EMAIL_SERVICE_URL
        sync: false
      - key: SERVICE_TOKEN
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_ENCRYPTION_KEY
        sync: false
      - key: SHOPIFY_SCOPES
        value: "read_orders,read_products,read_customers,read_analytics"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_FROM_NAME
        sync: false
      - key: N8N_WEBHOOK_ASSESSMENT
        sync: false
      - key: UNIFIED_MODE
        value: "true"
      - key: SIBILL_API_KEY
        sync: false
      - key: SIBILL_COMPANY_ID
        sync: false
      - key: SIBILL_API_URL
        sync: false

# ===========================================
# DATABASE
# ===========================================
databases:
  - name: evoluzione-imprese-db
    databaseName: evoluzione_imprese
    user: evoluzione_user
    plan: starter
